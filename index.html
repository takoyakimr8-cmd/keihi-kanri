<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経費管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #1a1a1a; padding-bottom: 30px; }
.header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 1rem; text-align: center; }
.header h1 { font-size: 18px; font-weight: 600; }
.container { padding: 1rem; max-width: 500px; margin: 0 auto; }
.big-btn { width: 100%; padding: 24px; border-radius: 16px; font-size: 20px; font-weight: 700; cursor: pointer; border: none; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-cafe { background: #fff3e0; color: #e65100; }
.btn-train { background: #e3f2fd; color: #1565c0; }
.btn-yabe { background: #e8f5e9; color: #2e7d32; }
.btn-other { background: #f5f5f5; color: #555; border: 1px solid #ddd; }
.btn-income { background: #e8f5e9; color: #1b5e20; }
.form-box { background: #fff; border-radius: 16px; padding: 1.2rem; margin-bottom: 12px; display: none; border: 2px solid #eee; }
.form-box.show { display: block; }
.form-box label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; margin-top: 12px; }
.form-box input, .form-box select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; background: #fafafa; }
.save-btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; border: none; background: #1a1a1a; color: #fff; margin-top: 16px; }
.summary-box { background: #fff; border-radius: 16px; padding: 1.2rem; margin-top: 20px; border: 1px solid #eee; }
.month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.month-nav button { background: #f0f0f0; border: none; border-radius: 8px; padding: 8px 16px; font-size: 16px; cursor: pointer; }
.month-nav span { font-size: 16px; font-weight: 700; }
.totals { display: flex; gap: 10px; margin-bottom: 12px; }
.total-item { flex: 1; background: #fafafa; border-radius: 10px; padding: 12px; text-align: center; }
.total-item .label { font-size: 11px; color: #888; }
.total-item .val { font-size: 17px; font-weight: 700; margin-top: 4px; }
.val.green { color: #2e7d32; }
.val.red { color: #c62828; }
.list-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
.list-item:last-child { border-bottom: none; }
.del-btn { background: none; border: none; color: #c62828; font-size: 13px; cursor: pointer; padding: 4px 8px; }
.success { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2e7d32; color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 15px; font-weight: 600; display: none; z-index: 100; }
.csv-btn { width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; cursor: pointer; border: 1px solid #ddd; background: #fff; margin-top: 12px; }
</style>
</head>
<body>

<div class="header"><h1>💰 経費管理</h1></div>
<div class="success" id="success">✅ 保存しました！</div>

<div class="container">

  <!-- カフェボタン -->
  <button class="big-btn btn-cafe" onclick="toggleForm('cafe')">☕ カフェ代</button>
  <div class="form-box" id="form-cafe">
    <label>金額（円）</label>
    <input type="number" id="cafe-amount" placeholder="例: 1200" inputmode="numeric">
    <label>日付</label>
    <input type="date" id="cafe-date">
    <button class="save-btn" onclick="saveCafe()">保存</button>
  </div>

  <!-- 営業ご飯ボタン -->
  <button class="big-btn btn-cafe" style="background:#fce4ec; color:#ad1457;" onclick="toggleForm('meshi')">🍽️ 営業のご飯代</button>
  <div class="form-box" id="form-meshi">
    <label>金額（円）</label>
    <input type="number" id="meshi-amount" placeholder="例: 3500" inputmode="numeric">
    <label>日付</label>
    <input type="date" id="meshi-date">
    <label>誰と？</label>
    <input type="text" id="meshi-note" placeholder="例: 〇〇社の田中さん">
    <button class="save-btn" onclick="saveMeshi()">保存</button>
  </div>

  <!-- 矢部ボタン -->
  <button class="big-btn btn-yabe" onclick="toggleForm('yabe')">🚃 矢部（今月まとめ）</button>
  <div class="form-box" id="form-yabe">
    <label>対象月</label>
    <input type="month" id="yabe-month">
    <label>行った回数</label>
    <input type="number" id="yabe-count" placeholder="例: 12" inputmode="numeric" oninput="updateYabeCalc()">
    <p style="margin-top:10px; font-size:15px; color:#2e7d32; font-weight:600;" id="yabe-calc">1,130円 × 0回 = 0円</p>
    <button class="save-btn" onclick="saveYabe()">保存</button>
  </div>

  <!-- その他交通費 -->
  <button class="big-btn btn-train" onclick="toggleForm('train')">🚉 その他の交通費</button>
  <div class="form-box" id="form-train">
    <label>金額（円）</label>
    <input type="number" id="train-amount" placeholder="例: 2576" inputmode="numeric">
    <label>日付</label>
    <input type="date" id="train-date">
    <label>メモ（どこへ？）</label>
    <input type="text" id="train-note" placeholder="例: 営業">
    <button class="save-btn" onclick="saveTrain()">保存</button>
  </div>

  <!-- 固定費ボタン -->
  <button class="big-btn" style="background:#ede7f6; color:#4527a0;" onclick="toggleForm('kotei')">📱 固定費（Zoom・AI・ネット等）</button>
  <div class="form-box" id="form-kotei">
    <label>何の費用？</label>
    <select id="kotei-category">
      <option data-amount="3000">Zoom（月額）</option>
      <option data-amount="">Claude・AI（月額）</option>
      <option data-amount="">Wi-Fi・ネット代</option>
      <option data-amount="">スマホ代</option>
      <option data-amount="">Stripe手数料</option>
      <option data-amount="">振込手数料</option>
    </select>
    <label>金額（円）</label>
    <input type="number" id="kotei-amount" placeholder="例: 3000" inputmode="numeric">
    <label>日付</label>
    <input type="date" id="kotei-date">
    <button class="save-btn" onclick="saveKotei()">保存</button>
  </div>

  <!-- その他 -->
  <button class="big-btn btn-other" onclick="toggleForm('other')">📝 その他の経費</button>
  <div class="form-box" id="form-other">
    <label>金額（円）</label>
    <input type="number" id="other-amount" placeholder="例: 3000" inputmode="numeric">
    <label>日付</label>
    <input type="date" id="other-date">
    <label>何の経費？</label>
    <select id="other-category">
      <option>教材・参考書</option>
      <option>パソコン・周辺機器</option>
      <option>文房具・印刷代</option>
      <option>お土産・プレゼント</option>
      <option>ツアー入場料・下見</option>
      <option>広告費</option>
      <option>接待交際費</option>
      <option>その他</option>
    </select>
    <label>メモ</label>
    <input type="text" id="other-note" placeholder="例: Zoom月額">
    <button class="save-btn" onclick="saveOther()">保存</button>
  </div>

  <!-- 収入 -->
  <button class="big-btn btn-income" onclick="toggleForm('income')">💵 収入</button>
  <div class="form-box" id="form-income">
    <label>金額（円）</label>
    <input type="number" id="income-amount" placeholder="例: 200000" inputmode="numeric">
    <label>日付</label>
    <input type="date" id="income-date">
    <label>収入源</label>
    <select id="income-source">
      <option>Stripe（レッスン・ツアー）</option>
      <option>銀行振込（営業）</option>
      <option>現金</option>
      <option>その他</option>
    </select>
    <button class="save-btn" onclick="saveIncome()">保存</button>
  </div>

  <!-- 集計 -->
  <div class="summary-box">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="totals">
      <div class="total-item">
        <div class="label">収入</div>
        <div class="val green" id="t-income">¥0</div>
      </div>
      <div class="total-item">
        <div class="label">経費</div>
        <div class="val red" id="t-expense">¥0</div>
      </div>
      <div class="total-item">
        <div class="label">利益</div>
        <div class="val" id="t-profit">¥0</div>
      </div>
    </div>
    <div id="entry-list"></div>
    <button class="csv-btn" onclick="exportCSV()">📥 CSVダウンロード</button>
    <button class="csv-btn" onclick="window.print()">🖨️ 印刷</button>
  </div>

</div>

<script>
let entries = JSON.parse(localStorage.getItem('keihiEntries') || '[]');
let currentMonth = new Date();

function today() { return new Date().toISOString().split('T')[0]; }

function toggleForm(name) {
  ['cafe','meshi','yabe','train','kotei','other','income'].forEach(n => {
    const el = document.getElementById('form-' + n);
    if (n === name) {
      el.classList.toggle('show');
    } else {
      el.classList.remove('show');
    }
  });
  // 日付を今日に設定
  const dateInputs = { cafe: 'cafe-date', meshi: 'meshi-date', train: 'train-date', kotei: 'kotei-date', other: 'other-date', income: 'income-date' };
  if (dateInputs[name]) document.getElementById(dateInputs[name]).value = today();
  if (name === 'yabe') {
    const d = new Date();
    document.getElementById('yabe-month').value = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
}

function showSuccess() {
  const el = document.getElementById('success');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 1500);
  renderSummary();
}

function addEntry(type, date, amount, category, note) {
  entries.push({ type, date, amount, category, note, id: Date.now() });
  localStorage.setItem('keihiEntries', JSON.stringify(entries));
}

function saveCafe() {
  const a = parseInt(document.getElementById('cafe-amount').value);
  if (!a) { alert('金額を入力してください'); return; }
  addEntry('expense', document.getElementById('cafe-date').value || today(), a, 'カフェ・食事代', '生徒とレッスン');
  document.getElementById('cafe-amount').value = '';
  document.getElementById('form-cafe').classList.remove('show');
  showSuccess();
}

function saveMeshi() {
  const a = parseInt(document.getElementById('meshi-amount').value);
  if (!a) { alert('金額を入力してください'); return; }
  addEntry('expense', document.getElementById('meshi-date').value || today(), a, '接待交際費', '営業会食 ' + (document.getElementById('meshi-note').value || ''));
  document.getElementById('meshi-amount').value = '';
  document.getElementById('meshi-note').value = '';
  document.getElementById('form-meshi').classList.remove('show');
  showSuccess();
}

function saveKotei() {
  const a = parseInt(document.getElementById('kotei-amount').value);
  if (!a) { alert('金額を入力してください'); return; }
  addEntry('expense', document.getElementById('kotei-date').value || today(), a, '通信費・手数料', document.getElementById('kotei-category').value);
  document.getElementById('kotei-amount').value = '';
  document.getElementById('form-kotei').classList.remove('show');
  showSuccess();
}

function updateYabeCalc() {
  const n = parseInt(document.getElementById('yabe-count').value) || 0;
  document.getElementById('yabe-calc').textContent = '1,130円 × ' + n + '回 = ' + (1130*n).toLocaleString() + '円';
}

function saveYabe() {
  const c = parseInt(document.getElementById('yabe-count').value);
  if (!c) { alert('回数を入力してください'); return; }
  const m = document.getElementById('yabe-month').value;
  const lastDay = new Date(m.split('-')[0], m.split('-')[1], 0).getDate();
  addEntry('expense', m + '-' + String(lastDay).padStart(2,'0'), 1130*c, '交通費', '矢部駅 レッスン準備 ' + c + '回分');
  document.getElementById('yabe-count').value = '';
  document.getElementById('form-yabe').classList.remove('show');
  showSuccess();
}

function saveTrain() {
  const a = parseInt(document.getElementById('train-amount').value);
  if (!a) { alert('金額を入力してください'); return; }
  addEntry('expense', document.getElementById('train-date').value || today(), a, '交通費', document.getElementById('train-note').value);
  document.getElementById('train-amount').value = '';
  document.getElementById('train-note').value = '';
  document.getElementById('form-train').classList.remove('show');
  showSuccess();
}

function saveOther() {
  const a = parseInt(document.getElementById('other-amount').value);
  if (!a) { alert('金額を入力してください'); return; }
  addEntry('expense', document.getElementById('other-date').value || today(), a, document.getElementById('other-category').value, document.getElementById('other-note').value);
  document.getElementById('other-amount').value = '';
  document.getElementById('other-note').value = '';
  document.getElementById('form-other').classList.remove('show');
  showSuccess();
}

function saveIncome() {
  const a = parseInt(document.getElementById('income-amount').value);
  if (!a) { alert('金額を入力してください'); return; }
  addEntry('income', document.getElementById('income-date').value || today(), a, document.getElementById('income-source').value, '');
  document.getElementById('income-amount').value = '';
  document.getElementById('form-income').classList.remove('show');
  showSuccess();
}

function changeMonth(dir) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + dir, 1);
  renderSummary();
}

function deleteEntry(id) {
  if (!confirm('削除しますか？')) return;
  entries = entries.filter(e => e.id !== id);
  localStorage.setItem('keihiEntries', JSON.stringify(entries));
  renderSummary();
}

function renderSummary() {
  const y = currentMonth.getFullYear();
  const m = currentMonth.getMonth();
  document.getElementById('month-label').textContent = y + '年' + (m+1) + '月';
  const filtered = entries.filter(e => {
    if (!e.date) return false;
    const d = new Date(e.date);
    return d.getFullYear() === y && d.getMonth() === m;
  });
  const income = filtered.filter(e => e.type==='income').reduce((s,e)=>s+e.amount,0);
  const expense = filtered.filter(e => e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('t-income').textContent = '¥' + income.toLocaleString();
  document.getElementById('t-expense').textContent = '¥' + expense.toLocaleString();
  document.getElementById('t-profit').textContent = '¥' + (income-expense).toLocaleString();
  
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('entry-list').innerHTML = sorted.length === 0 
    ? '<p style="text-align:center; color:#bbb; padding:20px 0; font-size:14px;">記録がありません</p>'
    : sorted.map(e => `
      <div class="list-item">
        <div>
          <div style="font-weight:600;">${e.category} <span style="color:${e.type==='income'?'#2e7d32':'#c62828'};">${e.type==='income'?'+':'-'}¥${e.amount.toLocaleString()}</span></div>
          <div style="font-size:12px; color:#999;">${e.date} ${e.note||''}</div>
        </div>
        <button class="del-btn" onclick="deleteEntry(${e.id})">削除</button>
      </div>
    `).join('');
}

function exportCSV() {
  const header = '日付,種別,金額,カテゴリ,メモ\n';
  const rows = entries.map(e => `${e.date},${e.type==='income'?'収入':'経費'},${e.amount},${e.category},${e.note||''}`).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '経費管理.csv';
  a.click();
}

renderSummary();
</script>
</body>
</html>
